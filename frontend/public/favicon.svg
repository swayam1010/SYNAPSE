<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Glow filter for realistic neural glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .dot-cyan { fill: #00f3ff; opacity: 0.8; }
    .dot-red { fill: #ff3366; opacity: 0.8; }
    .dot-white { fill: #ffffff; filter: url(#glow); }
    .squircle { fill: #111111; stroke: #222222; stroke-width: 1.5; }
  </style>

  <!-- 1. Premium squircle card container matching your exact layout design -->
  <rect x="5" y="5" width="90" height="90" rx="28" ry="28" class="squircle" />

  <g transform="translate(0, 0)">
    <!-- 2. Cyan Chromatic Shift Layer (Shifted Left & Up) -->
    <g transform="translate(-1.5, -1)">
      <!-- Top-Left -->
      <circle cx="38" cy="22" r="4.2" class="dot-cyan" />
      <circle cx="26" cy="34" r="4.2" class="dot-cyan" />
      <circle cx="38" cy="34" r="4.2" class="dot-cyan" />
      <circle cx="14" cy="46" r="4.2" class="dot-cyan" />
      <circle cx="26" cy="46" r="4.2" class="dot-cyan" />
      <circle cx="38" cy="46" r="4.2" class="dot-cyan" />
      
      <!-- Top-Right -->
      <circle cx="62" cy="22" r="4.2" class="dot-cyan" />
      <circle cx="62" cy="34" r="4.2" class="dot-cyan" />
      <circle cx="74" cy="34" r="4.2" class="dot-cyan" />
      <circle cx="62" cy="46" r="4.2" class="dot-cyan" />
      <circle cx="74" cy="46" r="4.2" class="dot-cyan" />
      <circle cx="86" cy="46" r="4.2" class="dot-cyan" />
      
      <!-- Bottom-Left -->
      <circle cx="14" cy="58" r="4.2" class="dot-cyan" />
      <circle cx="26" cy="58" r="4.2" class="dot-cyan" />
      <circle cx="38" cy="58" r="4.2" class="dot-cyan" />
      <circle cx="26" cy="70" r="4.2" class="dot-cyan" />
      <circle cx="38" cy="70" r="4.2" class="dot-cyan" />
      <circle cx="38" cy="82" r="4.2" class="dot-cyan" />
      
      <!-- Bottom-Right -->
      <circle cx="62" cy="58" r="4.2" class="dot-cyan" />
      <circle cx="74" cy="58" r="4.2" class="dot-cyan" />
      <circle cx="86" cy="58" r="4.2" class="dot-cyan" />
      <circle cx="62" cy="70" r="4.2" class="dot-cyan" />
      <circle cx="74" cy="70" r="4.2" class="dot-cyan" />
      <circle cx="62" cy="82" r="4.2" class="dot-cyan" />
    </g>

    <!-- 3. Red/Orange Chromatic Shift Layer (Shifted Right & Down) -->
    <g transform="translate(1.5, 1)">
      <!-- Top-Left -->
      <circle cx="38" cy="22" r="4.2" class="dot-red" />
      <circle cx="26" cy="34" r="4.2" class="dot-red" />
      <circle cx="38" cy="34" r="4.2" class="dot-red" />
      <circle cx="14" cy="46" r="4.2" class="dot-red" />
      <circle cx="26" cy="46" r="4.2" class="dot-red" />
      <circle cx="38" cy="46" r="4.2" class="dot-red" />
      
      <!-- Top-Right -->
      <circle cx="62" cy="22" r="4.2" class="dot-red" />
      <circle cx="62" cy="34" r="4.2" class="dot-red" />
      <circle cx="74" cy="34" r="4.2" class="dot-red" />
      <circle cx="62" cy="46" r="4.2" class="dot-red" />
      <circle cx="74" cy="46" r="4.2" class="dot-red" />
      <circle cx="86" cy="46" r="4.2" class="dot-red" />
      
      <!-- Bottom-Left -->
      <circle cx="14" cy="58" r="4.2" class="dot-red" />
      <circle cx="26" cy="58" r="4.2" class="dot-red" />
      <circle cx="38" cy="58" r="4.2" class="dot-red" />
      <circle cx="26" cy="70" r="4.2" class="dot-red" />
      <circle cx="38" cy="70" r="4.2" class="dot-red" />
      <circle cx="38" cy="82" r="4.2" class="dot-red" />
      
      <!-- Bottom-Right -->
      <circle cx="62" cy="58" r="4.2" class="dot-red" />
      <circle cx="74" cy="58" r="4.2" class="dot-red" />
      <circle cx="86" cy="58" r="4.2" class="dot-red" />
      <circle cx="62" cy="70" r="4.2" class="dot-red" />
      <circle cx="74" cy="70" r="4.2" class="dot-red" />
      <circle cx="62" cy="82" r="4.2" class="dot-red" />
    </g>

    <!-- 4. White Core Layer (Center Glow) -->
    <g>
      <!-- Top-Left -->
      <circle cx="38" cy="22" r="4" class="dot-white" />
      <circle cx="26" cy="34" r="4" class="dot-white" />
      <circle cx="38" cy="34" r="4" class="dot-white" />
      <circle cx="14" cy="46" r="4" class="dot-white" />
      <circle cx="26" cy="46" r="4" class="dot-white" />
      <circle cx="38" cy="46" r="4" class="dot-white" />
      
      <!-- Top-Right -->
      <circle cx="62" cy="22" r="4" class="dot-white" />
      <circle cx="62" cy="34" r="4" class="dot-white" />
      <circle cx="74" cy="34" r="4" class="dot-white" />
      <circle cx="62" cy="46" r="4" class="dot-white" />
      <circle cx="74" cy="46" r="4" class="dot-white" />
      <circle cx="86" cy="46" r="4" class="dot-white" />
      
      <!-- Bottom-Left -->
      <circle cx="14" cy="58" r="4" class="dot-white" />
      <circle cx="26" cy="58" r="4" class="dot-white" />
      <circle cx="38" cy="58" r="4" class="dot-white" />
      <circle cx="26" cy="70" r="4" class="dot-white" />
      <circle cx="38" cy="70" r="4" class="dot-white" />
      <circle cx="38" cy="82" r="4" class="dot-white" />
      
      <!-- Bottom-Right -->
      <circle cx="62" cy="58" r="4" class="dot-white" />
      <circle cx="74" cy="58" r="4" class="dot-white" />
      <circle cx="86" cy="58" r="4" class="dot-white" />
      <circle cx="62" cy="70" r="4" class="dot-white" />
      <circle cx="74" cy="70" r="4" class="dot-white" />
      <circle cx="62" cy="82" r="4" class="dot-white" />
    </g>
  </g>
</svg>