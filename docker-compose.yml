services:
  neo4j:
    image: neo4j:latest
    container_name: soma_neo4j
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: soma_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CHROMA_DB_PATH=./chroma_db_docker
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=neo4j
    volumes:
      - ./chroma_db_docker:/app/chroma_db_docker
      - ./data:/app/data
      - sqlite_data:/app
    depends_on:
      - neo4j

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: soma_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
  neo4j_data:
