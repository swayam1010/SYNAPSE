app = "synapse-ai"
primary_region = "sin"

[build]

[env]
  PORT = "8080"
  CHROMA_DB_PATH = "/data/chroma_db"
  SQLITE_DB_PATH = "/data/synapse_sessions.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "synapse_data"
  destination = "/data"
